# RealityDB — Ephemeral Test Database for Every PR
# Generated by: realitydb ci start --platform circleci
# Docs: https://realitydb.dev/docs/ci-cd

version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:20.0
      - image: cimg/postgres:16.0
        environment:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db

    environment:
      DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      REALITYDB_SEED: "42"

    steps:
      - checkout

      - run:
          name: Install RealityDB CLI
          command: npm install -g @realitydb/cli@latest

      - run:
          name: Generate test data
          command: |
            realitydb run \
              --pack templates/banking.json \
              --rows 5000 \
              --seed $REALITYDB_SEED \
              --format sql \
              --drop-tables \
              -o test-seed.sql

      - run:
          name: Seed test database
          command: PGPASSWORD=test psql -h localhost -U test -d test_db -f test-seed.sql

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}

      - run:
          name: Install dependencies
          command: npm ci

      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package-lock.json" }}

      - run:
          name: Run tests
          command: npm test

      - run:
          name: Run integration tests
          command: npm run test:integration || true

workflows:
  test:
    jobs:
      - test
