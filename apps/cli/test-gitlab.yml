# RealityDB — Ephemeral Test Database for Every MR
# Generated by: realitydb ci start --platform gitlab
# Docs: https://realitydb.dev/docs/ci-cd

variables:
  POSTGRES_DB: test_db
  POSTGRES_USER: test
  POSTGRES_PASSWORD: test
  REALITYDB_SEED: "42"

stages:
  - test

test:
  stage: test
  image: node:20
  services:
    - postgres:16
  variables:
    DATABASE_URL: postgresql://test:test@postgres:5432/test_db
  before_script:
    - npm install -g @realitydb/cli@latest
    - npm ci
  script:
    # Generate deterministic test data
    - realitydb run
        --pack templates/banking.json
        --rows 10000
        --seed $REALITYDB_SEED
        --format sql
        --drop-tables
        -o test-seed.sql

    # Seed the database
    - PGPASSWORD=test psql -h postgres -U test -d test_db -f test-seed.sql

    # Run tests
    - npm test
    - npm run test:integration || true

  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
