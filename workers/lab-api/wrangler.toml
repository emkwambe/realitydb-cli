name = "realitydb-lab-api"
main = "src/index.ts"
compatibility_date = "2024-06-20"

# Secrets (set via `wrangler secret put`):
#   NEON_API_KEY
#   NEON_PROJECT_ID
#   LAB_API_KEY

[[d1_databases]]
binding = "DB"
database_name = "realitydb-labs"
database_id = "TODO_REPLACE_AFTER_D1_CREATE"

[[r2_buckets]]
binding = "TEMPLATES"
bucket_name = "realitydb-templates"

[triggers]
crons = ["0 * * * *"]
